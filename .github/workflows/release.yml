name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.7.0). Must already exist."
        required: true

permissions:
  contents: write

# v0.7.0 ships Linux-only. macOS bundles fail on `dispatch2`
# bitflags-macro recursion (a Tauri transitive); Windows fails on
# `libsql-sys` using Unix-only OsStr::as_bytes(). Both tracked for
# a future v0.8.0+ release. The Linux jobs here build .deb + .rpm +
# .AppImage desktop bundles AND stand-alone CLI/daemon .deb + .rpm.
jobs:
  build:
    name: Build (linux-x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Bundled embedder assets needed for Tauri to copy them into the
      # AppImage/deb/rpm resources.
      - name: Cache bundled assets
        id: cache-assets
        uses: actions/cache@v4
        with:
          path: assets/
          key: bundled-assets-llamacpp-b9400-minilm-q8

      - name: Fetch bundled assets
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: bash scripts/fetch-bundled-assets.sh

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            librsvg2-dev libappindicator3-dev patchelf libssl-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install desktop dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundle
        working-directory: desktop
        run: pnpm tauri build --bundles deb,rpm,appimage

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staged
          shopt -s globstar nullglob
          for f in desktop/src-tauri/target/release/bundle/**/*.{deb,rpm,AppImage}; do
            cp "$f" staged/
          done
          ls -la staged/

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-linux-x86_64
          path: staged/
          retention-days: 7

  linux-packages:
    name: Linux server-side packages
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # The mnemos-daemon .deb / .rpm bundle the llama-server binary +
      # .so libraries + GGUF model. Prepare-linux-packages.sh will fetch
      # them on demand, but caching here saves ~50 MB / ~30s per build.
      - name: Cache bundled assets
        id: cache-assets
        uses: actions/cache@v4
        with:
          path: assets/
          key: bundled-assets-llamacpp-b9400-minilm-q8

      - name: Fetch bundled assets
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: bash scripts/fetch-bundled-assets.sh

      - name: Install cargo-deb + cargo-generate-rpm
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked
      - name: Build server packages
        run: bash scripts/prepare-linux-packages.sh
      - name: Upload server-side artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-server-packages
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
          retention-days: 7

  release:
    name: Publish release
    needs: [build, linux-packages]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten + list
        run: |
          mkdir -p release/
          find artifacts/ -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -exec cp -v {} release/ \;
          ls -la release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: false
          body_path: CHANGELOG.md
          files: release/*
          make_latest: true
          fail_on_unmatched_files: false
