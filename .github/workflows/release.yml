name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.9.4). Must already exist."
        required: true

permissions:
  contents: write

# Linux-only desktop bundle. macOS bundles fail on `dispatch2`
# bitflags-macro recursion (a Tauri transitive); Windows fails on
# `libsql-sys` using Unix-only OsStr::as_bytes(). Both tracked for
# a future release. The daemon + CLI ship as Tauri sidecars inside
# the desktop bundle — no separate server packages.
jobs:
  build-and-release:
    name: Build and publish desktop bundle (linux-x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache bundled assets
        id: cache-assets
        uses: actions/cache@v4
        with:
          path: assets/
          key: bundled-assets-llamacpp-b9400-runtime-embedder

      - name: Fetch bundled assets
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: bash scripts/fetch-bundled-assets.sh

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            librsvg2-dev libappindicator3-dev patchelf libssl-dev \
            libfuse2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install desktop dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundle
        working-directory: desktop
        run: pnpm tauri build --bundles deb,rpm
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Stage release artifacts
        shell: bash
        run: |
          mkdir -p release
          shopt -s globstar nullglob
          for f in desktop/src-tauri/target/release/bundle/**/*.{deb,rpm,AppImage,AppImage.tar.gz,sig}; do
            cp -v "$f" release/
          done
          echo "--- Release artifacts ---"
          ls -la release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: false
          body_path: CHANGELOG.md
          files: release/*
          make_latest: true
          fail_on_unmatched_files: false
