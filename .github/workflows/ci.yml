name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is intentionally excluded: the `libsql-sys` backend is
        # Unix-only in the pinned version (uses std::os::unix). Windows support
        # is blocked on libsql gaining Windows compatibility (or swapping the
        # storage backend) — revisit in Plan 7 packaging.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        # Default features only. The opt-in `rerank-onnx` feature pulls `ort`
        # (ONNX runtime) which needs system onnxruntime + a working release;
        # the current pinned `ort` RC does not compile in CI. rerank-onnx is
        # built/verified manually until a stable `ort` lands.
        run: cargo test --workspace
